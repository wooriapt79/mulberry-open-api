[server]
port = 8080
headless = true
runOnSave = true
enableXsrfProtection = true

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[theme]
primaryColor = "#7c3aed"
backgroundColor = "#0d0620"
secondaryBackgroundColor = "#160d30"
textColor = "#e2e8f0"
font = "sans serif"
