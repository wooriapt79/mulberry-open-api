<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💬 Team Chat — Mulberry Mission Control</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
:root {
  --bg:#0d1117; --bg-2:#161b22; --bg-3:#21262d; --border:#30363d;
  --text:#e6edf3; --text-2:#8b949e; --text-3:#6e7681;
  --accent:#388bfd; --accent-h:#58a6ff;
  --green:#3fb950; --red:#f85149; --orange:#d29922; --purple:#8b5cf6;
  --my-bg:#1a3a5c; --other-bg:#21262d; --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* ── 상단 네비 ── */
nav{height:52px;background:var(--bg-2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0;flex-shrink:0;z-index:200;}
.nav-logo{font-size:16px;font-weight:700;color:var(--purple);margin-right:20px;white-space:nowrap;}
.nav-logo span{color:var(--text);}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{padding:6px 14px;border-radius:6px;font-size:13px;color:var(--text-2);cursor:pointer;white-space:nowrap;text-decoration:none;display:flex;align-items:center;gap:5px;transition:background .15s,color .15s;}
.nav-tab:hover{background:var(--bg-3);color:var(--text);}
.nav-tab.active{background:rgba(56,139,253,.15);color:var(--accent-h);font-weight:600;}
.nav-right{display:flex;align-items:center;gap:10px;margin-left:12px;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--text-3);transition:background .3s;}
.conn-dot.on{background:var(--green);}
.conn-dot.off{background:var(--red);}
.nav-user{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;}

/* ── 레이아웃 ── */
.app{display:flex;flex:1;overflow:hidden;}

/* ── 사이드바 ── */
.sidebar{width:220px;min-width:220px;background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-head{padding:14px 12px 8px;border-bottom:1px solid var(--border);}
.sidebar-head-title{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.8px;}
.ch-list{flex:1;overflow-y:auto;padding:6px 4px;}
.ch-list::-webkit-scrollbar{width:4px;}
.ch-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ch-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13.5px;color:var(--text-2);transition:all .12s;margin:1px 0;}
.ch-item:hover{background:var(--bg-3);color:var(--text);}
.ch-item.active{background:rgba(56,139,253,.12);color:var(--accent-h);font-weight:600;}
.ch-item .ch-icon{font-size:12px;flex-shrink:0;}
.ch-item .ch-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ch-item .ch-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center;flex-shrink:0;}
.ch-add{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:#ffffff;transition:color .15s;}
.ch-add:hover{color:var(--accent);}
.online-section{border-top:1px solid var(--border);padding:8px 4px 6px;}
.online-title{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.7px;padding:0 10px 6px;}
.online-user{display:flex;align-items:center;gap:8px;padding:4px 10px;font-size:12px;color:var(--text-2);}
.online-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;position:relative;flex-shrink:0;}
.online-av::after{content:'';position:absolute;bottom:0;right:0;width:7px;height:7px;border-radius:50%;background:var(--green);border:1.5px solid var(--bg-2);}
.sidebar-me{border-top:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:10px;}
.me-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.me-info{flex:1;min-width:0;}
.me-name{font-size:12px;font-weight:600;}
.me-role{font-size:10px;color:var(--text-2);}
.logout-btn{background:none;border:none;cursor:pointer;color:#ffffff;font-size:14px;padding:3px;border-radius:4px;transition:color .15s;}
.logout-btn:hover{color:var(--red);}

/* ── 채팅 영역 ── */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.chat-ch-name{font-size:15px;font-weight:700;}
.chat-ch-desc{font-size:12px;color:var(--text-2);}
.chat-header .spacer{flex:1;}
.header-btn{background:none;border:none;cursor:pointer;color:var(--text-2);font-size:15px;padding:5px;border-radius:5px;transition:color .15s,background .15s;}
.header-btn:hover{color:var(--text);background:var(--bg-3);}
.msgs{flex:1;overflow-y:auto;padding:12px 0 4px;}
.msgs::-webkit-scrollbar{width:6px;}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.date-sep{display:flex;align-items:center;gap:10px;padding:10px 16px 4px;font-size:11px;color:var(--text-3);}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border);}
.msg-row{display:flex;gap:10px;padding:3px 16px;border-radius:6px;transition:background .1s;align-items:flex-end;}
.msg-row:hover{background:rgba(255,255,255,.03);}
.msg-row.mine{flex-direction:row-reverse;}
.msg-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.msg-body{max-width:68%;display:flex;flex-direction:column;gap:3px;}
.mine .msg-body{align-items:flex-end;}
.msg-meta{display:flex;align-items:baseline;gap:6px;font-size:11px;}
.mine .msg-meta{flex-direction:row-reverse;}
.msg-sender{font-weight:600;color:var(--text-2);}
.msg-time{color:var(--text-3);}
.msg-bubble{padding:8px 12px;border-radius:12px;font-size:13.5px;line-height:1.55;word-break:break-word;white-space:pre-wrap;}
.mine .msg-bubble{background:var(--my-bg);border-bottom-right-radius:3px;}
.msg-row:not(.mine) .msg-bubble{background:var(--other-bg);border-bottom-left-radius:3px;}
.sys-msg{text-align:center;font-size:11px;color:var(--text-3);padding:6px 16px;display:flex;align-items:center;gap:8px;}
.sys-msg::before,.sys-msg::after{content:'';flex:1;height:1px;background:var(--border);}
.typing-bar{min-height:20px;padding:0 18px;font-size:11px;color:var(--text-2);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.t-dots{display:flex;gap:3px;align-items:center;}
.t-dots span{width:4px;height:4px;background:var(--text-2);border-radius:50%;animation:tdot 1.2s infinite;}
.t-dots span:nth-child(2){animation-delay:.2s;}
.t-dots span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}
.input-zone{padding:6px 14px 14px;flex-shrink:0;}
.input-box{display:flex;align-items:flex-end;gap:8px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;transition:border-color .2s;}
.input-box:focus-within{border-color:var(--accent);}
#msg-in{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;line-height:1.5;resize:none;max-height:110px;font-family:inherit;}
#msg-in::placeholder{color:var(--text-3);}
.ib-btn{background:none;border:none;cursor:pointer;color:#ffffff;font-size:17px;padding:3px 4px;border-radius:5px;transition:color .15s;line-height:1;}
.ib-btn:hover{color:var(--text-2);}
.send-btn{background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:14px;padding:6px 11px;border-radius:7px;transition:background .15s;line-height:1;}
.send-btn:hover{background:var(--accent-h);}
.send-btn:disabled{background:var(--bg-3);color:var(--text-3);cursor:default;}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-2);}
.chat-empty .ei{font-size:52px;}
.chat-empty h3{font-size:17px;font-weight:700;}
.chat-empty p{font-size:13px;color:var(--text-3);}

/* ── 로그인 오버레이 ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(6px);}
.login-card{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:32px;width:360px;display:flex;flex-direction:column;gap:18px;}
.lc-title{font-size:20px;font-weight:700;}
.lc-title em{color:var(--purple);font-style:normal;}
.lc-sub{font-size:12px;color:var(--text-2);margin-top:-10px;}
.lc-field{display:flex;flex-direction:column;gap:5px;}
.lc-field label{font-size:11px;color:var(--text-2);font-weight:500;}
.lc-field input{background:var(--bg-3);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s;}
.lc-field input:focus{border-color:var(--accent);}
.lc-err{font-size:12px;color:var(--red);display:none;}
.lc-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.lc-btn:hover{background:var(--accent-h);}

/* ── 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:500;}
.modal-bg.show{display:flex;}
.modal-card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:24px;width:310px;display:flex;flex-direction:column;gap:14px;}
.modal-title{font-size:15px;font-weight:700;}
.mf{display:flex;flex-direction:column;gap:5px;}
.mf label{font-size:11px;color:var(--text-2);}
.mf input,.mf select{background:var(--bg-3);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;}
.mf select option{background:var(--bg-2);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.m-cancel{background:var(--bg-3);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;}
.m-ok{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;}

/* ── 할당량 초과 배너 (신규) ── */
.quota-banner{display:none;background:linear-gradient(90deg,#7c3aed,#1d4ed8);color:#fff;font-size:12px;padding:8px 16px;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid #4c1d95;animation:slidein .3s ease;}
.quota-banner.show{display:flex;}
.quota-banner .qb-icon{font-size:16px;}
.quota-banner .qb-msg{flex:1;}
.quota-banner .qb-time{font-weight:700;color:#c4b5fd;}
.quota-banner .qb-close{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;}
.quota-banner .qb-close:hover{color:#fff;background:rgba(255,255,255,.15);}

/* ── Bio 상태바 (신규) ── */
.bio-bar{height:28px;background:var(--bg-2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;font-size:11px;color:var(--text-3);flex-shrink:0;}
.bio-item{display:flex;align-items:center;gap:4px;}
.bio-dot{width:6px;height:6px;border-radius:50%;}
.bio-dot.green{background:var(--green);}
.bio-dot.orange{background:var(--orange);}
.bio-dot.red{background:var(--red);}
.bio-dot.blue{background:var(--accent);}

@keyframes slidein{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;}}
@keyframes msgIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
@media(max-width:600px){
  .sidebar{width:52px;min-width:52px;}
  .ch-name,.online-title,.me-info,.ch-add span,.sidebar-head-title{display:none;}
  .ch-item{justify-content:center;padding:8px 4px;}
  .sidebar-me{justify-content:center;padding:8px;}
  .nav-tab span{display:none;}
}
  </style>
</head>
<body>

<!-- 로그인 오버레이 -->
<div class="overlay" id="overlay">
  <div class="login-card">
    <div>
      <div class="lc-title">🌿 <em>Mulberry</em> Team Chat</div>
      <div class="lc-sub">팀 채팅방에 접속합니다</div>
    </div>
    <div class="lc-field">
      <label>이메일</label>
      <input type="email" id="lemail" placeholder="email@mulberry.com" />
    </div>
    <div class="lc-field">
      <label>비밀번호</label>
      <input type="password" id="lpw" placeholder="••••••••" />
    </div>
    <div class="lc-err" id="lerr"></div>
    <button class="lc-btn" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- 새 채널 모달 -->
<div class="modal-bg" id="chModal">
  <div class="modal-card">
    <div class="modal-title">새 채널 만들기</div>
    <div class="mf">
      <label>채널 이름</label>
      <input type="text" id="chName" placeholder="general, dev, ops ..." />
    </div>
    <div class="mf">
      <label>유형</label>
      <select id="chType">
        <option value="public">🔓 공개</option>
        <option value="private">🔒 비공개</option>
        <option value="meeting">📹 회의실</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="m-cancel" onclick="closeModal()">취소</button>
      <button class="m-ok" onclick="createCh()">생성</button>
    </div>
  </div>
</div>

<!-- 네비게이션 -->
<nav>
  <div class="nav-logo">🌿 Mulberry<span> Control</span></div>
  <div class="nav-tabs">
    <a class="nav-tab" href="/index.html">📡 <span>모니터링</span></a>
    <a class="nav-tab active" href="/chat.html">💬 <span>Team Chat</span></a>
    <a class="nav-tab" href="/index.html#agents">🤖 <span>에이전트</span></a>
    <a class="nav-tab" href="/index.html#mhc">🖥 <span>mHC</span></a>
  </div>
  <div class="nav-right">
    <div class="conn-dot off" id="cdot" title="연결 상태"></div>
    <div class="nav-user" id="navAv" style="background:var(--purple)">🌿</div>
  </div>
</nav>

<!-- Bio 상태바 (신규) -->
<div class="bio-bar" id="bioBar">
  <div class="bio-item"><div class="bio-dot green" id="bioDotBank"></div><span id="bioBank">Bank: OK</span></div>
  <div class="bio-item"><div class="bio-dot blue" id="bioDotLab"></div><span id="bioLab">Lab: 정상</span></div>
  <div class="bio-item"><div class="bio-dot green" id="bioDotCond"></div><span id="bioCond">컨디션: 양호</span></div>
  <div class="bio-item" style="margin-left:auto;"><span id="bioStatus">🟢 활성</span></div>
</div>

<!-- 할당량 초과 배너 (신규) -->
<div class="quota-banner" id="quotaBanner">
  <span class="qb-icon">⚠️</span>
  <span class="qb-msg" id="quotaMsg">API 할당량 초과 — 외부 근무 중, 복귀 예정</span>
  <span class="qb-time" id="quotaTime">03:40</span>
  <button class="qb-close" onclick="hideQuotaBanner()">✕</button>
</div>

<!-- 앱 메인 -->
<div class="app">
  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-head-title">채널</div>
    </div>
    <div class="ch-list" id="chList"></div>
    <div class="ch-add" onclick="openModal()">
      <span style="font-size:15px">＋</span>
      <span>채널 추가</span>
    </div>
    <div class="online-section">
      <div class="online-title">온라인</div>
      <div id="onlineList"></div>
    </div>
    <div class="sidebar-me">
      <div class="me-av" id="meAv" style="background:var(--purple)">🌿</div>
      <div class="me-info">
        <div class="me-name" id="meName">—</div>
        <div class="me-role" id="meRole">Mulberry</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="로그아웃">⏻</button>
    </div>
  </div>

  <!-- 채팅 -->
  <div class="chat" id="chatMain">
    <div class="chat-empty" id="chatEmpty">
      <div class="ei">💬</div>
      <h3>채널을 선택하세요</h3>
      <p>왼쪽에서 채널을 클릭하면 대화가 시작됩니다</p>
    </div>
    <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-header">
        <span style="font-size:15px" id="chHdIcon">#</span>
        <span class="chat-ch-name" id="chHdName">채널</span>
        <span class="chat-ch-desc" id="chHdDesc"></span>
        <div class="spacer"></div>
        <button class="header-btn" title="멤버 초대" onclick="inviteMember()">👥</button>
        <button class="header-btn" title="검색" onclick="alert('메시지 검색 (준비 중)')">🔍</button>
      </div>
      <div class="msgs" id="msgs"></div>
      <div class="typing-bar" id="tBar"></div>
      <div class="input-zone">
        <div class="input-box">
          <textarea id="msg-in" rows="1"
            placeholder="메시지 입력... (Enter 전송 / Shift+Enter 줄바꿈)"
            onkeydown="onKey(event)" oninput="onType()"></textarea>
          <button class="ib-btn" onclick="addEmoji()" title="이모지">😊</button>
          <button class="send-btn" id="sbtn" onclick="send()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 🌿 MULBERRY TEAM CHAT — CLIENT SCRIPT v2 (UTF-8 fixed)
// 2026-04-05 Trang — 한글 깨짐 수정 + 할당량 intercept + Bio
// ============================================================
const API = '';
let socket, me, curCh, curChName;
let typing = false, typTimer = null;
let typingPeers = {};
const COLORS = ['#8b5cf6','#1f6feb','#3fb950','#d29922','#f85149','#388bfd','#e879f9','#06b6d4'];
const $ = id => document.getElementById(id);
function clr(s=''){let h=0;for(const c of s)h=c.charCodeAt(0)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length];}
function ini(s=''){return s.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';}
function hms(d){return new Date(d).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function dateFmt(d){
  const t=new Date(d),n=new Date();
  if(t.toDateString()===n.toDateString()) return '오늘';
  const yd=new Date(n); yd.setDate(n.getDate()-1);
  if(t.toDateString()===yd.toDateString()) return '어제';
  return t.toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── 할당량 초과 인터셉트 (신규) ──────────────────────────────
const QUOTA_RESET_HOUR = 3;
const QUOTA_RESET_MIN  = 40;
const QUOTA_MSGS_AWAY  = [
  '급하게 처리할 것이 있어서 잠시 자리 비우겠습니다 🏃',
  '잠시 외부 업무 처리 중입니다. 곧 돌아오겠습니다.',
  '미팅 중 긴급 사안이 발생했습니다. 잠시 후 재개합니다.'
];

function isQuotaError(msg) {
  const lower = (msg||'').toLowerCase();
  return lower.includes('quota') || lower.includes('rate limit') ||
         lower.includes('429') || lower.includes('too many') ||
         lower.includes('limit exceeded') || lower.includes('할당량');
}

function getResetTimeStr() {
  const now = new Date();
  const reset = new Date(now);
  reset.setHours(QUOTA_RESET_HOUR, QUOTA_RESET_MIN, 0, 0);
  if (reset <= now) reset.setDate(reset.getDate() + 1);
  const hh = String(reset.getHours()).padStart(2,'0');
  const mm = String(reset.getMinutes()).padStart(2,'0');
  return `${hh}:${mm}`;
}

function showQuotaBanner(context='normal') {
  const banner = $('quotaBanner');
  const msgEl  = $('quotaMsg');
  const timeEl = $('quotaTime');
  if (context === 'meeting') {
    const pick = QUOTA_MSGS_AWAY[Math.floor(Math.random()*QUOTA_MSGS_AWAY.length)];
    msgEl.textContent = pick;
    timeEl.textContent = '';
  } else {
    msgEl.textContent = '🌿 외부 근무 중 — 할당량 리셋 후 복귀 예정';
    timeEl.textContent = '복귀 ' + getResetTimeStr();
  }
  banner.classList.add('show');
}
function hideQuotaBanner() { $('quotaBanner').classList.remove('show'); }

// API 요청 래퍼 (할당량 에러 감지)
async function apiFetch(url, opts={}) {
  try {
    const res = await fetch(url, opts);
    if (res.status === 429) { showQuotaBanner(); return null; }
    if (!res.ok) {
      const d = await res.json().catch(()=>({}));
      if (isQuotaError(d.message||'')) { showQuotaBanner(); return null; }
      throw new Error(d.message || res.statusText);
    }
    return res;
  } catch(e) {
    if (isQuotaError(e.message)) { showQuotaBanner(); return null; }
    throw e;
  }
}

// ── Bio 상태 (신규) ─────────────────────────────────────────
const BIO_CONDITIONS = {
  good:    { dot:'green',  text:'컨디션: 양호',  status:'🟢 활성' },
  busy:    { dot:'orange', text:'컨디션: 바쁨',  status:'🟡 응답 지연 가능' },
  meeting: { dot:'orange', text:'컨디션: 회의중', status:'📹 회의중' },
  away:    { dot:'red',    text:'컨디션: 자리비움', status:'🔴 자리비움' },
  quota:   { dot:'red',    text:'컨디션: 할당대기', status:'⏳ 03:40 복귀' },
};
let bioState = 'good';

function setBio(state, bankTxt='', labTxt='') {
  bioState = state;
  const cfg = BIO_CONDITIONS[state] || BIO_CONDITIONS.good;
  const dot = $('bioDotCond');
  dot.className = `bio-dot ${cfg.dot}`;
  $('bioCond').textContent  = cfg.text;
  $('bioStatus').textContent = cfg.status;
  if (bankTxt) $('bioBank').textContent = `Bank: ${bankTxt}`;
  if (labTxt)  $('bioLab').textContent  = `Lab: ${labTxt}`;
}

function updateBioFromTime() {
  const h = new Date().getHours();
  if (h >= 0 && h < 4)       setBio('quota');
  else if (h >= 9 && h < 18) setBio('good');
  else                        setBio('away');
}

// ── 로그인 ─────────────────────────────────────────────────
async function doLogin(){
  const email=$('lemail').value.trim(), pw=$('lpw').value;
  const err=$('lerr'); err.style.display='none';
  if(!email||!pw){err.textContent='이메일과 비밀번호를 입력하세요.';err.style.display='block';return;}
  try{
    const res = await apiFetch(`${API}/api/auth/login`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pw})
    });
    if(!res) return; // quota hit
    const d = await res.json();
    const token=d.token||d.data?.token;
    me=d.user||d.data?.user;
    if(!token) throw new Error('�a`큰 없음');
    localStorage.setItem('mc_token',token);
    localStorage.setItem('mc_user',JSON.stringify(me));
    $('overlay').style.display='none';
    boot();
  }catch(e){err.textContent=e.message;err.style.display='block';}
}
function logout(){localStorage.removeItem('mc_token');localStorage.removeItem('mc_user');location.reload();}

// ── 부트 ────────────────────────────────────────────────────
async function boot(){
  const tok=localStorage.getItem('mc_token');
  const us=localStorage.getItem('mc_user');
  if(!tok||!us){$('overlay').style.display='flex';return;}
  me=JSON.parse(us);
  setMeUI();
  connectSocket(tok);
  await loadChs();
  updateBioFromTime();
  setInterval(updateBioFromTime, 60000);
}
function setMeUI(){
  if(!me) return;
  const name=me.displayName||me.username||'사용자';
  $('meName').textContent=name;
  $('meRole').textContent=me.role||'Member';
  const av=$('meAv'); av.style.background=clr(name); av.textContent=ini(name);
  const nav=$('navAv'); nav.style.background=clr(name); nav.textContent=ini(name);
}

// ── Socket.IO ───────────────────────────────────────────────
function connectSocket(tok){
  socket=io(API||window.location.origin,{
    auth:{token:tok}, transports:['websocket','polling'], reconnectionDelay:1200
  });
  socket.on('connect',()=>{
    $('cdot').className='conn-dot on';
    if(curCh) socket.emit('join-channel',{channelId:curCh,userId:me._id,userName:me.displayName||me.username});
  });
  socket.on('disconnect',()=>{ $('cdot').className='conn-dot off'; });
  socket.on('new-message', msg=>{ appendMsg(msg,true); scrollBottom(); });
  socket.on('user-typing',({userId,userName,isTyping})=>{
    if(userId===me?._id) return;
    if(isTyping) typingPeers[userId]=userName||userId;
    else delete typingPeers[userId];
    renderTyping();
  });
  socket.on('user-joined',({userId,userName})=>{
    if(userId!==me?._id) sysMsg(`${userName||userId}님이 입장했습니다`);
    addOnlineUser(userId,userName);
  });
  socket.on('user-left',({userId,userName})=>{
    sysMsg(`${userName||userId}님이 퇴장했습니다`);
    removeOnlineUser(userId);
  });
  socket.on('quota-exceeded', ()=>{ showQuotaBanner(); setBio('quota'); });
}

// ── 채널 목록 ────────────────────────────────────────────────
async function loadChs(){
  const tok=localStorage.getItem('mc_token');
  try{
    const res = await apiFetch(`${API}/api/channels`,{headers:{'Authorization':'Bearer '+tok}});
    if(!res) return;
    const d=await res.json();
    const chs=d.channels||d.data?.channels||d||[];
    renderChList(chs);
    if(chs.length>0) openCh(chs[0]);
  }catch{
    const demo=[
      {_id:'demo-general',name:'general',type:'public'},
      {_id:'demo-dev',name:'dev',type:'public'},
      {_id:'demo-ops',name:'ops',type:'private'},
    ];
    renderChList(demo); openCh(demo[0]);
  }
}
function renderChList(chs){
  const el=$('chList'); el.innerHTML='';
  chs.forEach(ch=>{
    const icon=ch.type==='meeting'?'📹':ch.type==='private'?'🔒':'#';
    const d=document.createElement('div');
    d.className='ch-item'+(ch._id===curCh?' active':'');
    d.dataset.id=ch._id;
    d.innerHTML<`<span class="ch-icon">${icon}</span><span class="ch-name">${esc(ch.name)}</span>`;
    d.onclick=()=>openCh(ch); el.appendChild(d);
  });
}

// ── 채널 열기 ────────────────────────────────────────────────
async function openCh(ch){
  if(curCh && socket?.connected){
    socket.emit('leave-channel',{channelId:curCh,userId:me?._id,userName:me?.displayName});
  }
  curCh=ch._id; curChName=ch.name;
  document.querySelectorAll('.ch-item').forEach(e=>e.classList.toggle('active',e.dataset.id===ch._id));
  const icon=ch.type==='meeting'?'📹':ch.type==='private'?'🔒':'#';
  $('chHdIcon').textContent=icon;
  $('chHdName').textContent=ch.name;
  $('chHdDesc').textContent=ch.description||'';
  $('chatEmpty').style.display='none';
  const cv=$('chatView'); cv.style.display='flex'; cv.style.flexDirection='column';
  cv.style.overflow='hidden'; cv.style.flex='1';
  $('msgs').innerHTML=''; typingPeers={}; renderTyping();
  if(socket?.connected){
    socket.emit('join-channel',{channelId:ch._id,userId:me?._id,userName:me?.displayName||me?.username});
  }
  await loadMsgs(ch._id);
  scrollBottom();
  $('msg-in').focus();
  if(ch.type==='meeting') setBio('meeting');
}

// ── 메시지 로드 ──────────────────────────────────────────────
async function loadMsgs(chId){
  const tok=localStorage.getItem('mc_token');
  try{
    const res = await apiFetch(`${API}/api/chat/messages/${chId}?limit=60`,{
      headers:{'Authorization':'Bearer '+tok}
    });
    if(!res) return;
    const d=await res.json();
    const msgs=d.messages||d.data?.messages||d||[];
    let lastDate='';
    msgs.forEach(m=>{
      const md=dateFmt(m.createdAt);
      if(md!==lastDate){appendDate(md);lastDate=md;}
      appendMsg(m,false);
    });
  }catch{
    sysMsg('채널에 연결됩니다 — 메시지를 입력해 보세요 💬');
    const demos=[
      {sender:{displayName:'CSA Kbin',_id:'kbin'},content:'🌿 Team Chat 활성화됩니다!',createdAt:new Date(Date.now()-600000)},
      {sender:{displayName:'CTO Koda',_id:'koda'},content:'Socket.IO 연결 완료. 실시간 채팅 준비됐습니다 ✅',createdAt:new Date(Date.now()-300000)},
      {sender:{displayName:'Nguyen Trang',_id:'trang'},content:'반가워요! 팀 채팅창 완성했습니다 🎉\n오늘 Trang이 직접 만들었어요.',createdAt:new Date(Date.now()-60000)},
    ];
    appendDate('오늘');
    demos.forEach(m=>appendMsg(m,false));
  }
}

// ── 메시지 렌더 ──────────────────────────────────────────────
function appendMsg(msg, anim=true){
  const container=$('msgs');
  const sid=msg.sender?._id||msg.senderId||'?';
  const sname=msg.sender?.displayName||msg.sender?.username||msg.senderName||'?';
  const isMe=sid===me?._id;
  const txt=msg.content||msg.text||'';
  const t=hms(msg.createdAt||Date.now());
  const row=document.createElement('div');
  row.className='msg-row'+(isMe?' mine':'');
  if(anim) row.style.animation='msgIn .18s ease';
  row.innerHTML=`
    <div class="msg-av" style="background:${clr(sname)}">${ini(sname)}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-sender">${isMe?'나':esc(sname)}</span>
        <span class="msg-time">${t}</span>
      </div>
      <div class="msg-bubble">${esc(txt)}</div>
    </div>`;
  container.appendChild(row);
}
function appendDate(str){
  const d=document.createElement('div'); d.className='date-sep'; d.textContent=str;
  $('msgs').appendChild(d);
}
function sysMsg(txt){
  const d=document.createElement('div'); d.className='sys-msg'; d.textContent=txt;
  $('msgs').appendChild(d);
}
function scrollBottom(){ const c=$('msgs'); requestAnimationFrame(()=>{ c.scrollTop=c.scrollHeight; }); }

// ── 메시지 전송 ──────────────────────────────────────────────
async function send(){
  const inp=$('msg-in'); const txt=inp.value.trim();
  if(!txt||!curCh) return;
  inp.value=''; resize(inp); stopTyping();
  const tok=localStorage.getItem('mc_token');
  const temp={_id:'t'+Date.now(),sender:me,content:txt,channelId:curCh,createdAt:new Date().toISOString()};
  appendMsg(temp,true); scrollBottom();
  try{
    const res = await apiFetch(`${API}/api/chat/messages`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
      body:JSON.stringify({channelId:curCh,content:txt})
    });
    if(!res) return;
    const d=await res.json();
    const saved=d.message||d.data?.message||d;
    if(socket?.connected) socket.emit('send-message',{channelId:curCh,message:saved});
  }catch(e){
    if(isQuotaError(e.message)) showQuotaBanner();
  }
}

// ── 키 핸들러 / 타이핑 ──────────────────────────────────────
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function onType(){
  resize($('msg-in'));
  if(!socket?.connected||!curCh) return;
  if(!typing){ typing=true; socket.emit('typing-start',{channelId:curCh,userId:me?._id,userName:me?.displayName||me?.username}); }
  clearTimeout(typTimer); typTimer=setTimeout(stopTyping,2000);
}
function stopTyping(){
  if(!typing) return; typing=false;
  if(socket?.connected&&curCh) socket.emit('typing-stop',{channelId:curCh,userId:me?._id});
}
function renderTyping(){
  const bar=$('tBar'); const names=Object.values(typingPeers).slice(0,3);
  if(!names.length){bar.innerHTML='';return;}
  bar.innerHTML=`<div class="t-dots"><span></span><span></span><span></span></div><span>${names.join(', ')}님이 입력 중...</span>`;
}
function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

// ── 이모지 ────────────────────────────────────────────────
const EMOJIS=['😊','👍','🌿','✅','🔥','💪','🤖','❤️','🎉','🔍','😅','⚡'];
let ei=0;
function addEmoji(){
  const inp=$('msg-in'),pos=inp.selectionStart;
  const em=EMOJIS[ei++%EMOJIS.length];
  inp.value=inp.value.slice(0,pos)+em+inp.value.slice(pos);
  inp.focus(); inp.setSelectionRange(pos+em.length,pos+em.length);
}

// ── 온라인 유저 ────────────────────────────────────────────
const _onlineMap={};
function addOnlineUser(uid,name){ if(!uid||_onlineMap[uid]) return; _onlineMap[uid]=name; renderOnline(); }
function removeOnlineUser(uid){ delete _onlineMap[uid]; renderOnline(); }
function renderOnline(){
  const el=$('onlineList'); el.innerHTML='';
  Object.entries(_onlineMap).slice(0,8).forEach(([uid,name])=>{
    const n=name||uid; const d=document.createElement('div'); d.className='online-user';
    d.innerHTML=`<div class="online-av" style="background:${clr(n)}">${ini(n)}</div><span>${esc(n)}</span>`;
    el.appendChild(d);
  });
}

// ── 채널 생성 모달 ─────────────────────────────────────────
function openModal(){ $('chModal').classList.add('show'); }
function closeModal(){ $('chModal').classList.remove('show'); }
async function createCh(){
  const name=$('chName').value.trim().replace(/\s+/g,'-').toLowerCase();
  const type=$('chType').value;
  if(!name) return;
  const tok=localStorage.getItem('mc_token');
  try{
    const res = await apiFetch(`${API}/api/channels`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
      body:JSON.stringify({name,type})
    });
    if(!res) return;
    const d=await res.json();
    const ch=d.channel||d.data?.channel||d;
    closeModal(); $('chName').value='';
    await loadChs(); if(ch._id) openCh(ch);
  }catch{ alert('채널 생성 실패. 다시 시도해 주세요.'); }
}

// ── 멤버 초대 ──────────────────────────────────────────────
async function inviteMember(){
  const email=prompt(`#${curChName} 에 초대할 이메일 주소:`);
  if(!email) return;
  const tok=localStorage.getItem('mc_token');
  try{
    await apiFetch(`${API}/api/channels/${curCh}/invite`,{
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
      body:JSON.stringify({email})
    });
    alert(`${email} 님을 초대했습니다.`);
  }catch{ alert('초대에 실패했습니다.'); }
}

// ── 초기화 ────────────────────────────────────────────────
window.onload=()=>{
  $('lpw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
  const tok=localStorage.getItem('mc_token');
  if(tok){ $('overlay').style.display='none'; boot(); }
};
